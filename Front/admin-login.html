<!DOCTYPE html>
<html lang="pt-BR">

<head>
    <link rel="shortcut icon" href="./IMG/Logo_Empresa.png" type="image/png">
    <link rel="icon" href="./IMG/Logo_Empresa.png" type="image/png">

    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">

    <title>Login Admin - Audio Visual</title>

    <link rel="stylesheet" href="responsive.css" />

    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            min-height: 100vh;
            display: flex;
            flex-direction: column;
            justify-content: center;
            align-items: center;
        }

        .navbar {
            position: absolute;
            top: 0;
            left: 0;
            right: 0;
            background: rgba(0, 0, 0, 0.3);
            padding: 15px 30px;
            display: flex;
            justify-content: space-between;
            align-items: center;
            backdrop-filter: blur(10px);
        }

        .navbar a {
            color: white;
            text-decoration: none;
            margin-left: 20px;
            font-size: 14px;
            transition: opacity 0.3s;
        }

        .navbar a:hover {
            opacity: 0.8;
        }

        .container {
            background: white;
            padding: 40px;
            border-radius: 10px;
            box-shadow: 0 10px 25px rgba(0, 0, 0, 0.2);
            width: 100%;
            max-width: 400px;
            margin-top: 60px;
        }

        .logo-area {
            text-align: center;
            margin-bottom: 30px;
        }

        .logo-area h1 {
            color: #667eea;
            font-size: 28px;
            margin-bottom: 5px;
        }

        .logo-area p {
            color: #999;
            font-size: 14px;
        }

        .form-group {
            margin-bottom: 20px;
        }

        .form-group label {
            display: block;
            margin-bottom: 8px;
            color: #333;
            font-weight: 600;
        }

        .form-group input {
            width: 100%;
            padding: 12px;
            border: 1px solid #ddd;
            border-radius: 5px;
            font-size: 14px;
            transition: border-color 0.3s;
        }

        .form-group input:focus {
            outline: none;
            border-color: #667eea;
            box-shadow: 0 0 5px rgba(102, 126, 234, 0.1);
        }

        .password-field {
            position: relative;
        }

        .password-field input {
            padding-right: 55px;
        }

        .toggle-password {
            position: absolute;
            top: 50%;
            right: 10px;
            transform: translateY(-50%);

            width: 38px;
            height: 38px;

            border: none;
            background: transparent;
            border-radius: 10px;

            cursor: pointer;

            display: flex;
            align-items: center;
            justify-content: center;

            color: #666;

            transition:
                background 0.25s ease,
                color 0.25s ease,
                transform 0.25s ease;
        }

        .toggle-password:hover {
            background: rgba(102, 126, 234, 0.08);
            color: #667eea;
        }

        .toggle-password:active {
            transform: translateY(-50%) scale(0.92);
        }

        .toggle-password svg {
            width: 20px;
            height: 20px;

            transition:
                opacity 0.25s ease,
                transform 0.25s ease;

            opacity: 1;
        }

        .toggle-password.animating svg {
            opacity: 0;
            transform: rotate(90deg) scale(0.7);
        }

        .btn-login {
            width: 100%;
            padding: 12px;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            color: white;
            border: none;
            border-radius: 5px;
            font-size: 16px;
            font-weight: 600;
            cursor: pointer;
            transition: transform 0.2s;
        }

        .btn-login:hover {
            transform: translateY(-2px);
        }

        .btn-login:active {
            transform: translateY(0);
        }

        .error-message {
            color: #e74c3c;
            font-size: 14px;
            margin-bottom: 20px;
            padding: 10px;
            background: #fadbd8;
            border-radius: 5px;
            display: none;
        }

        .success-message {
            color: #27ae60;
            font-size: 14px;
            margin-bottom: 20px;
            padding: 10px;
            background: #d5f4e6;
            border-radius: 5px;
            display: none;
        }

        .back-link {
            text-align: center;
            margin-top: 20px;
        }

        .back-link a {
            color: #667eea;
            text-decoration: none;
            font-size: 14px;
        }

        .back-link a:hover {
            text-decoration: underline;
        }

        .loading {
            display: none;
            text-align: center;
            color: #667eea;
        }

        .spinner {
            display: inline-block;
            width: 20px;
            height: 20px;
            border: 3px solid #f3f3f3;
            border-top: 3px solid #667eea;
            border-radius: 50%;
            animation: spin 1s linear infinite;
        }

        @keyframes spin {

            0% {
                transform: rotate(0deg);
            }

            100% {
                transform: rotate(360deg);
            }

        }
    </style>

</head>

<body>

    <div class="container">

        <div class="logo-area">
            <h1>Painel Admin</h1>
            <p>Tech Take</p>
        </div>

        <div class="error-message" id="errorMsg"></div>
        <div class="success-message" id="successMsg"></div>

        <form id="loginForm">

            <div class="form-group">
                <label for="email">Email do Administrador</label>

                <input type="email" id="email" name="email" required placeholder="admin@buxaaudiovisual.com">
            </div>

            <div class="form-group password-field">

                <label for="senha">Senha</label>

                <input type="password" id="senha" name="senha" required placeholder="Digite sua senha">

                <button type="button" class="toggle-password" id="togglePassword" aria-label="Mostrar senha">
                    <i data-lucide="eye-off"></i>
                </button>

            </div>

            <button type="submit" class="btn-login" id="btnLogin">

                <span id="btnText">Entrar</span>

                <div class="loading" id="loading">
                    <div class="spinner"></div>
                </div>

            </button>

        </form>

        <div class="back-link">
            <a href="/home">← Voltar ao site</a>
        </div>

    </div>

    <script type="module">

        import {
            createIcons,
            eye,
            eyeOff
        } from 'https://cdn.jsdelivr.net/npm/lucide@latest/+esm';

        createIcons({
            icons: {
                eye,
                eyeOff
            }
        });

        const form = document.getElementById('loginForm');
        const email = document.getElementById('email');
        const senha = document.getElementById('senha');

        const errorMsg = document.getElementById('errorMsg');
        const successMsg = document.getElementById('successMsg');

        const btnLogin = document.getElementById('btnLogin');
        const btnText = document.getElementById('btnText');
        const loading = document.getElementById('loading');

        const togglePassword =
            document.getElementById('togglePassword');

        let visible = false;

        togglePassword.addEventListener('click', () => {

            togglePassword.classList.add('animating');

            setTimeout(() => {

                visible = !visible;

                senha.type =
                    visible ? 'text' : 'password';

                togglePassword.innerHTML =
                    visible
                        ? '<i data-lucide="eye"></i>'
                        : '<i data-lucide="eye-off"></i>';

                createIcons({
                    icons: {
                        eye,
                        eyeOff
                    }
                });

                togglePassword.setAttribute(
                    'aria-label',
                    visible
                        ? 'Ocultar senha'
                        : 'Mostrar senha'
                );

                togglePassword.classList.remove('animating');

            }, 120);

        });

        form.addEventListener('submit', async (e) => {

            e.preventDefault();

            errorMsg.style.display = 'none';
            successMsg.style.display = 'none';

            btnLogin.disabled = true;

            btnText.style.display = 'none';
            loading.style.display = 'block';

            try {

                const API_BASE = 'http://localhost:3000';

                const response =
                    await fetch(`${API_BASE}/api/admin/login`, {

                        method: 'POST',

                        headers: {
                            'Content-Type': 'application/json'
                        },

                        body: JSON.stringify({
                            email: email.value,
                            senha: senha.value
                        })

                    });

                const data = await response.json();

                if (data.success) {

                    localStorage.setItem(
                        'adminToken',
                        data.token
                    );

                    successMsg.textContent =
                        'Login realizado com sucesso! Redirecionando...';

                    successMsg.style.display = 'block';

                    setTimeout(() => {

                        window.location.href =
                            '/admin-panel';

                    }, 1500);

                }

                else {

                    errorMsg.textContent =
                        data.message || 'Erro ao fazer login';

                    errorMsg.style.display = 'block';

                    btnLogin.disabled = false;

                    btnText.style.display = 'inline';
                    loading.style.display = 'none';

                }

            }

            catch (err) {

                errorMsg.textContent =
                    'Erro ao conectar com o servidor';

                errorMsg.style.display = 'block';

                btnLogin.disabled = false;

                btnText.style.display = 'inline';
                loading.style.display = 'none';

            }

        });

        window.addEventListener('load', () => {

            const token =
                localStorage.getItem('adminToken');

            if (token) {
                window.location.href = '/admin-panel';
            }

        });

    </script>

</body>

</html>
