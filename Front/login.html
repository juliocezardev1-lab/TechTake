<!DOCTYPE html>
<html lang="pt-BR">

<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Login | TechTake</title>

    <link rel="icon" type="image/png" href="IMG/Logo_Empresa.png" />

    <link rel="preconnect" href="https://fonts.googleapis.com" />

    <link href="https://fonts.googleapis.com/css2?family=Bebas+Neue&family=Exo+2:wght@300;400;600;700&display=swap"
        rel="stylesheet" />

    <style>
        :root {
            --clr-bg: #0b0e14;
            --clr-surface: #121620;
            --clr-border: #1e2533;
            --clr-accent1: #00c6ff;
            --clr-accent2: #0072ff;
            --clr-accent3: #00ffd5;
            --clr-text: #e8edf5;
            --clr-muted: #6b7a99;
            --font-display: 'Bebas Neue', sans-serif;
            --font-body: 'Exo 2', sans-serif;
        }

        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {

            min-height: 100vh;

            background:
                linear-gradient(rgba(11, 14, 20, .88),
                    rgba(11, 14, 20, .92)),
                url("https://images.unsplash.com/photo-1516321318423-f06f85e504b3?w=1800&q=80");

            background-size: cover;
            background-position: center;

            display: flex;
            align-items: center;
            justify-content: center;

            padding: 2rem;

            font-family: var(--font-body);

            color: var(--clr-text);

        }

        .auth-container {
            width: 100%;
            max-width: 440px;
        }

        .auth-card {

            background: rgba(18, 22, 32, .95);

            border: 1px solid #1e2533;

            backdrop-filter: blur(18px);

            border-radius: 20px;

            padding: 3rem;

            box-shadow:
                0 0 35px rgba(0, 0, 0, .35);

        }

        .auth-logo {

            width: 90px;

            display: block;

            margin:
                0 auto 1.5rem;

        }

        h1 {

            font-family: var(--font-display);

            font-size: 3rem;

            text-align: center;

            margin-bottom: .5rem;

            letter-spacing: .04em;

        }

        .auth-subtitle {

            text-align: center;

            color: var(--clr-muted);

            margin-bottom: 2rem;

            line-height: 1.5;

        }

        .input-group {

            display: flex;

            flex-direction: column;

            margin-bottom: 1.2rem;

        }

        .input-group label {

            margin-bottom: .5rem;

            font-size: .9rem;

            color: var(--clr-muted);

        }

        .input-group input {

            background: #0f141d;

            border: 1px solid #1e2533;

            color: white;

            padding: 1rem;

            border-radius: 12px;

            outline: none;

            transition:
                border-color .3s,
                box-shadow .3s;

        }

        .input-group input:focus {

            border-color: var(--clr-accent1);

            box-shadow:
                0 0 12px rgba(0, 198, 255, .18);

        }

        .auth-btn {

            width: 100%;

            padding: 1rem;

            border: none;

            border-radius: 12px;

            cursor: pointer;

            font-weight: 700;

            letter-spacing: .08em;

            text-transform: uppercase;

            color: white;

            margin-top: .8rem;

            background:
                linear-gradient(135deg,
                    var(--clr-accent2),
                    var(--clr-accent1));

            transition:
                transform .25s,
                opacity .25s;

        }

        .auth-btn:hover {

            transform: translateY(-2px);

            opacity: .96;

        }

        .auth-footer {

            text-align: center;

            margin-top: 1.8rem;

            color: var(--clr-muted);

        }

        .auth-footer a {

            color: var(--clr-accent1);

            text-decoration: none;

        }

        .success-msg {

            margin-top: 1rem;

            color: #00ff99;

            text-align: center;

        }

        .error-msg {

            margin-top: 1rem;

            color: #ff5f5f;

            text-align: center;

        }

        .password-field {
            display: flex;
            flex-direction: column;
            margin-bottom: 1.2rem;
        }

        .password-field label {
            margin-bottom: .5rem;
            font-size: .9rem;
            color: var(--clr-muted);
        }

        .password-field input {
            background: #0f141d;
            border: 1px solid #1e2533;
            color: white;
            padding: 1rem;
            border-radius: 12px;
            outline: none;
            transition: border-color .3s, box-shadow .3s;
        }

        .password-field input:focus {
            border-color: var(--clr-accent1);
            box-shadow: 0 0 12px rgba(0, 198, 255, .18);
        }

        .toggle-password-link {
            background: none;
            border: none;
            color: #00c6ff;
            cursor: pointer;
            padding: 4px 8px;
            text-decoration: none;
            transition: all 0.3s;
            display: flex;
            align-items: center;
            justify-content: center;
        }

        .toggle-password-link:hover {
            color: #0072ff;
            transform: scale(1.15);
        }

        .toggle-password-link:active {
            transform: scale(0.95);
        }
    </style>
    <link rel="stylesheet" href="responsive.css" />

</head>

<body>

    <div class="auth-container">

        <div class="auth-card">

            <img src="IMG/Logo_Empresa.png" class="auth-logo" />

            <h1>Entrar</h1>

            <p class="auth-subtitle">
                Faça login para acessar sua conta
            </p>

            <form id="loginForm">

                <div class="input-group">

                    <label>E-mail</label>

                    <input type="email" id="email" required />

                </div>

                <div class="input-group password-field">

                    <div style="display: flex; justify-content: space-between; align-items: center; margin-bottom: 0.5rem;">
                        <label>Senha</label>
                        <button type="button" class="toggle-password-link" id="togglePassword" aria-label="Mostrar senha">
                            <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" width="18" height="18">
                                <path d="M1 12s4-8 11-8 11 8 11 8-4 8-11 8-11-8-11-8z"></path>
                                <circle cx="12" cy="12" r="3"></circle>
                            </svg>
                        </button>
                    </div>

                    <input type="password" id="senha" required />

                </div>

                <div class="input-group remember-me">

                    <label style="display: flex; align-items: center; gap: 0.5rem;">

                        <input type="checkbox" id="lembreMe" checked />

                        Lembre-me

                    </label>

                </div>

                <button type="submit" class="auth-btn" id="loginBtn">
                    Entrar
                </button>

            </form>

            <p class="auth-footer">

                Não possui conta?

                <a href="/cadastro">
                    Criar conta
                </a>

            </p>

            <div id="message"></div>

        </div>

    </div>

    <footer>
        <p>© 2026 TechTake Audiovisual. Todos os direitos reservados. Reprodução total ou parcial proibida sem
            autorização prévia.</p>
    </footer>

    <script src="config.js"></script>

    <script type="module">
        const togglePassword = document.getElementById('togglePassword');
        const senhaInput = document.getElementById('senha');
        let visible = false;

        togglePassword.addEventListener('click', (e) => {
            e.preventDefault();
            visible = !visible;
            senhaInput.type = visible ? 'text' : 'password';

            const svg = togglePassword.querySelector('svg');
            if (visible) {
                svg.innerHTML = '<path d="M1 12s4-8 11-8 11 8 11 8-4 8-11 8-11-8-11-8z"></path><circle cx="12" cy="12" r="3"></circle><line x1="4" y1="4" x2="20" y2="20" stroke="currentColor" stroke-width="2"></line>';
                togglePassword.setAttribute('aria-label', 'Ocultar senha');
            } else {
                svg.innerHTML = '<path d="M1 12s4-8 11-8 11 8 11 8-4 8-11 8-11-8-11-8z"></path><circle cx="12" cy="12" r="3"></circle>';
                togglePassword.setAttribute('aria-label', 'Mostrar senha');
            }
        });
    </script>

    <script>
        redirecionarSeLogado();

        const form =
            document.getElementById("loginForm");

        const message =
            document.getElementById("message");

        form.addEventListener(
            "submit",
            async (e) => {

                e.preventDefault();

                const email =
                    document.getElementById("email").value;

                const senha =
                    document.getElementById("senha").value;

                const lembreMe =
                    document.getElementById("lembreMe")?.checked || false;

                // Mostrar loading
                const btn = document.querySelector(".auth-btn");
                btn.disabled = true;
                btn.textContent = "Entrando...";

                try {

                    const response = await fetch(
                        `${API_BASE_URL}/api/login`,
                        {
                            method: "POST",

                            headers: {
                                "Content-Type": "application/json"
                            },

                            body: JSON.stringify({
                                email,
                                senha
                            })
                        }
                    );

                    const data =
                        await response.json();

                    if (data.success) {

                        // Salvar baseado na opção "lembre-me"
                        const storage = lembreMe ? localStorage : sessionStorage;

                        storage.setItem(
                            "token",
                            data.token
                        );

                        storage.setItem(
                            "usuario",
                            JSON.stringify(data.usuario)
                        );

                        showMessage(
                            "Login realizado com sucesso!",
                            "success"
                        );

                        setTimeout(() => {

                            window.location.href = "/home";

                        }, 1200);

                    } else {

                        showMessage(
                            data.error,
                            "error"
                        );

                    }

                } catch (error) {

                    showMessage(
                        "Erro no servidor.",
                        "error"
                    );

                } finally {

                    btn.disabled = false;
                    btn.textContent = "Entrar";

                }

            }
        );

    </script>

</body>

</html>
