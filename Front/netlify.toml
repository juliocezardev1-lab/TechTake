# Netlify config para o frontend TechTake
# Deploy: "Base directory = Front", "Publish directory = Front"

[[redirects]]
  from = "/"
  to = "/home.html"
  status = 200

[[redirects]]
  from = "/home"
  to = "/home.html"
  status = 200

[[redirects]]
  from = "/login"
  to = "/login.html"
  status = 200

[[redirects]]
  from = "/cadastro"
  to = "/cadastro.html"
  status = 200

[[redirects]]
  from = "/servicos"
  to = "/servicos.html"
  status = 200

[[redirects]]
  from = "/sobre"
  to = "/sobre.html"
  status = 200

[[redirects]]
  from = "/contato"
  to = "/contato.html"
  status = 200

[[redirects]]
  from = "/portefolio"
  to = "/portefolio.html"
  status = 200

[[redirects]]
  from = "/admin-login"
  to = "/admin-login.html"
  status = 200

[[redirects]]
  from = "/admin-panel"
  to = "/admin-panel.html"
  status = 200

# Qualquer rota não reconhecida → 404 (não deixar cair no home)
[[redirects]]
  from = "/*"
  to = "/home.html"
  status = 404
