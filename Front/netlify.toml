# Configuração do Netlify para o frontend TechTake
#
# Como configurar no Netlify:
#   Base directory:    Front
#   Publish directory: Front
#   Build command:     (deixar vazio)
#
# Por que este arquivo existe:
#   O Netlify serve arquivos estáticos. Quando alguém acessa /home, o Netlify
#   procura um arquivo chamado "home" — que não existe. Este arquivo ensina o
#   Netlify a redirecionar /home para /home.html, /login para /login.html, etc.

[[redirects]]
  from = "/"
  to   = "/home.html"
  status = 200

[[redirects]]
  from = "/home"
  to   = "/home.html"
  status = 200

