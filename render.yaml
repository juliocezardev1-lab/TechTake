services:
  - type: web
    name: techtake-api
    env: node
    root: .
    buildCommand: cd Back && npm install --build-from-source=sqlite3 && node seed.js
    startCommand: npm start
    envVars:
      - key: NODE_ENV
        value: production
      - key: JWT_SECRET
        sync: false  # IMPORTANTE: defina manualmente no painel do Render com uma chave forte e fixa
      - key: FRONTEND_ORIGIN
        value: https://SEU-SITE.netlify.app  # ← substitua pela URL real do Netlify
