services:
  - type: web
    name: techtake-api
    env: node
    root: .
    buildCommand: cd Back && npm install && node seed.js
    startCommand: npm start
    envVars:
      # Modo de execução — não altere
      - key: NODE_ENV
        value: production

      # Chave secreta para assinar os tokens JWT de login
      # ⚠️ OBRIGATÓRIO: defina manualmente no painel do Render
      # Gere uma chave em: https://randomkeygen.com (use "CodeIgniter Encryption Keys")
      - key: JWT_SECRET
        sync: false

      # URL do seu site no Netlify — necessário para liberar o CORS
      # ⚠️ OBRIGATÓRIO: substitua pela URL real após fazer o deploy no Netlify
      # Exemplo: https://techtake-audiovisual.netlify.app
      - key: FRONTEND_ORIGIN
        sync: false
