services:
  - type: web
    name: techtake-site
    env: node
    root: .
    buildCommand: cd Back && npm install --build-from-source=sqlite3 && node seed.js
    startCommand: npm start
    envVars:
      - key: NODE_ENV
        value: production
      - key: JWT_SECRET
        generateValue: true
      - key: FRONTEND_ORIGIN
        value: https://techtake-site.onrender.com
